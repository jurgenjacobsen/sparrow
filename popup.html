<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparrow - Reminder Manager</title>
  <link rel="stylesheet" href="style/popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1 class="title">
        <img src="assets/icon.png" alt="" class="title-icon" />
        <span>Sparrow</span>
      </h1>
      <button id="settingsBtn" class="settings-btn" title="Settings">
        ⚙️
      </button>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Reminders List -->
      <div id="reminders-container" class="reminders-container">
        <!-- Reminder items and add reminder row will be added here dynamically -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state">
        <p>No reminders yet. Add one below!</p>
      </div>
    </main>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="setting-item">
          <label>
            <input type="checkbox" id="desktopNotifications" />
            <span>Enable Desktop Notifications</span>
          </label>
        </div>
        <div class="setting-item">
          <label>
            <input type="checkbox" id="notificationSounds" />
            <span>Enable Notification Sounds</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" id="saveSettingsBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal hidden">
    <div class="modal-content delete-modal-content">
      <div class="modal-header">
        <h2>Delete Reminder?</h2>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this reminder? This action cannot be undone.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelDeleteBtn">Cancel</button>
        <button class="btn-danger" id="confirmDeleteBtn">Delete</button>
      </div>
    </div>
  </div>

  <script src="scripts/popup.js" type="module"></script>
</body>
</html>
